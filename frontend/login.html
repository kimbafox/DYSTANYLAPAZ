<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - DYNASTY 87</title>
<link rel="stylesheet" href="./css/style.css">
</head>

<body class="authPage">

<main class="authShell">

<section class="authVisual authVisual--login">
<div class="authVisual__overlay">
<p class="authVisual__eyebrow">DYNApaz 87</p>
<h1 class="authVisual__title">Encuentra, vende y conecta con clientes reales.</h1>
<p class="authVisual__text">Accede a tu cuenta para ver propiedades, contactar vendedores y gestionar tu perfil.</p>
</div>
</section>

<section class="authBox authBox--split">

<p id="authFeedback" class="feedback" hidden></p>

<h2>Iniciar sesión</h2>

<p class="authIntro">Accede con tu cuenta </p>

<input id="correo" type="email" placeholder="Correo (gmail o hotmail)">
<input id="password" type="password" placeholder="Contraseña">

<button onclick="login()">Entrar</button>

<div class="authLinks">
<p>No tienes cuenta?</p>
<a href="registro.html">Registrarse</a>
</div>

</section>

</main>

<script src="./js/auth.js"></script>

</body>
</html>
