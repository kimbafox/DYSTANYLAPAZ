<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro - DYNASTY 87</title>
<link rel="stylesheet" href="./css/style.css">
</head>

<body class="authPage">

<main class="authShell">

<section class="authVisual authVisual--register">
<div class="authVisual__overlay">
<p class="authVisual__eyebrow">Registro</p>
<h1 class="authVisual__title">Crea tu cuenta y empieza a publicar tus inmuebles.</h1>
<p class="authVisual__text">Registra tus datos, activa tu rol y entra al panel con una interfaz más clara y directa.</p>
</div>
</section>

<section class="authBox authBox--split">

<h2>Crear cuenta</h2>

<p class="authIntro">Registra tus datos personales. El rol vendedor también conserva permisos de usuario.</p>

<p id="authFeedback" class="feedback" hidden></p>

<div class="authGrid">
<input id="nombre" type="text" placeholder="Nombre">
<input id="apellido" type="text" placeholder="Apellido">
<input id="ci" type="text" placeholder="CI">
<input id="telefono" type="tel" placeholder="Teléfono">
<input id="fechaNacimiento" type="date">
<input id="correo" type="email" placeholder="Correo Gmail o Hotmail">
</div>

<textarea id="direccion" placeholder="Dirección"></textarea>

<input id="password" type="password" placeholder="Contraseña">

<div class="roleSelector">
<label class="roleOption">
<input id="roleUsuario" type="checkbox" checked>
<span>Usuario</span>
</label>
<label class="roleOption">
<input id="roleVendedor" type="checkbox">
<span>Vendedor</span>
</label>
</div>

<button onclick="register()">Registrarse</button>

<div class="authLinks">
<a href="login.html">Volver al login</a>
</div>

</section>

</main>

<script src="./js/auth.js"></script>

</body>
</html>
